site_name: Stationeers Modding

theme:
  name: material
  palette: 
    # Palette toggle for dark mode
    - scheme: slate
      primary: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

plugins:
  - search
  - awesome-nav
  - redirects:
      redirect_maps:
        'codemod.md': 'modding/codemod.md'
        'structure.md': 'modding/structure.md'

markdown_extensions:
  - admonition
  - def_list
  - attr_list
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/StationeersLaunchPad/docs
      name: Contribute

watch:
  - snippets